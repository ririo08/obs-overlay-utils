name: pr_check_generate

on:
  pull_request:
    branches: ["main"]

jobs:
  generate_main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies 📦
        run: bun install

      - name: Generate 💚
        run: bun generate